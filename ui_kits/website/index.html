<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ajaRed — Applied AI for Enterprises</title>
<meta name="viewport" content="width=1440">
<link rel="icon" href="../../assets/favicon.png">
<link rel="stylesheet" href="site.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Ruler.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="OfferCards.jsx"></script>
<script type="text/babel" src="Capability.jsx"></script>
<script type="text/babel" src="ContactBlock.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>

<script type="text/babel">
const App = () => {
  const [route, setRoute] = React.useState(() => localStorage.getItem('ajr.route') || 'home');
  React.useEffect(() => { localStorage.setItem('ajr.route', route); }, [route]);

  return (
    <div className="frame">
      <Ruler max={600} />
      <Header route={route} setRoute={setRoute} />
      <main className="content">
        {route === 'home' && (<>
          <Hero />
          <OfferCards />
          <ContactBlock />
        </>)}
        {route === 'capabilities' && (<>
          <Capability />
          <ContactBlock />
        </>)}
        {route === 'work' && (<>
          <section className="hero"><div className="hero__inner">
            <span className="eyebrow">SELECTED WORK</span>
            <h1 className="hero__h1">Private case studies on request.</h1>
            <p className="hero__lede">We work mostly with financial services and public sector. Most work is covered by NDA — <em>ask, and we'll share what we can</em>.</p>
          </div></section>
          <ContactBlock />
        </>)}
        {route === 'contact' && (<ContactBlock />)}
      </main>
      <Footer />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sense of Self — app UI kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../../assets/favicon.png">
<link rel="stylesheet" href="sos.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="BottomNav.jsx"></script>
<script type="text/babel" src="Onboarding.jsx"></script>
<script type="text/babel" src="Today.jsx"></script>
<script type="text/babel" src="Reflect.jsx"></script>
<script type="text/babel" src="Prompts.jsx"></script>
<script type="text/babel" src="Library.jsx"></script>
<script type="text/babel" src="Profile.jsx"></script>

<script type="text/babel">
const Phone = ({children}) => (
  <div className="phone"><div className="phone__bezel">
    <div className="phone__notch" />
    <div className="phone__statusbar"><span>9:41</span><span>● ●●●</span></div>
    <div className="phone__screen">{children}</div>
    <div className="phone__home" />
  </div></div>
);

const App = () => {
  const [stage, setStage] = React.useState(()=>localStorage.getItem('sos.stage')||'onb');
  const [tab,   setTab]   = React.useState(()=>localStorage.getItem('sos.tab')||'today');
  React.useEffect(()=>localStorage.setItem('sos.stage',stage),[stage]);
  React.useEffect(()=>localStorage.setItem('sos.tab',tab),[tab]);

  let screen=null, nav=false;
  if (stage==='onb') screen = <Onboarding onDone={()=>setStage('app')} />;
  else if (stage==='reflect') screen = <Reflect onBack={()=>setStage('app')} onSave={()=>setStage('app')} />;
  else {
    nav = true;
    if (tab==='today')   screen = <Today onReflect={()=>setStage('reflect')} />;
    if (tab==='prompts') screen = <Prompts onPick={()=>setStage('reflect')} />;
    if (tab==='library') screen = <Library />;
    if (tab==='profile') screen = <Profile onLogout={()=>setStage('onb')} />;
  }
  return <Phone>{screen}{nav && <SosNav tab={tab} setTab={setTab} />}</Phone>;
};
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

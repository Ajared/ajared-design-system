<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Family Tree — app UI kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="../../assets/favicon.png">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Phone.jsx"></script>
<script type="text/babel" src="BottomNav.jsx"></script>
<script type="text/babel" src="Splash.jsx"></script>
<script type="text/babel" src="Login.jsx"></script>
<script type="text/babel" src="Tree.jsx"></script>
<script type="text/babel" src="Invites.jsx"></script>
<script type="text/babel" src="Account.jsx"></script>

<script type="text/babel">
const App = () => {
  const [stage, setStage] = React.useState(() => localStorage.getItem('ajr.app.stage') || 'splash'); // splash | auth | app
  const [tab, setTab]     = React.useState(() => localStorage.getItem('ajr.app.tab') || 'tree');

  React.useEffect(() => localStorage.setItem('ajr.app.stage', stage), [stage]);
  React.useEffect(() => localStorage.setItem('ajr.app.tab', tab), [tab]);

  let screen = null;
  let showNav = false;

  if (stage === 'splash') {
    screen = <Splash onContinue={() => setStage('auth')} />;
  } else if (stage === 'auth') {
    screen = <Login onLogin={() => setStage('app')} />;
  } else {
    showNav = true;
    if (tab === 'home')    screen = <div style={{padding:24,fontFamily:'Inter'}}><ScreenHeader title="Home" /><p style={{color:'#626262',padding:'0 0',margin:0}}>Home feed — coming next. Tap <strong>Tree</strong> to explore.</p></div>;
    if (tab === 'tree')    screen = <Tree />;
    if (tab === 'invites') screen = <Invites />;
    if (tab === 'account') screen = <Account onLogout={() => setStage('auth')} />;
  }

  return (
    <Phone>
      {screen}
      {showNav && <BottomNav tab={tab} setTab={setTab} />}
    </Phone>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:12px;align-items:center;flex-wrap:wrap">
    <button style="padding:14px 26px;border:2px solid #a1665e;background:transparent;color:#a1665e;font-family:var(--font-primary);font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:0.05em;border-radius:2px;cursor:crosshair">PRIMARY</button>
    <button style="padding:14px 26px;border:2px solid #a1665e;background:#a1665e;color:#fff;font-family:var(--font-primary);font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:0.05em;border-radius:2px;cursor:crosshair">HOVER</button>
    <button style="padding:14px 26px;border:none;background:#058c8c;color:#fff;font-family:var(--font-primary);font-weight:700;text-transform:uppercase;font-size:12px;letter-spacing:0.03em;border-radius:2px;cursor:crosshair">SUBMIT (INK)</button>
    <a href="#" style="display:inline-flex;align-items:baseline;gap:8px;color:#a1665e;font-weight:700;border-bottom:2px solid #a1665e">Learn more <span>→</span></a>
  </div>
  <span class="meta">MARKETING BUTTONS · 2px radius · all-caps</span>
</div>
</body></html>

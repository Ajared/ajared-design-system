<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="padding:0">
  <!-- marketing offer card: flips to teal on hover -->
  <a href="#" style="display:block;padding:24px;border:1px solid #058c8c;border-radius:2px;background:#fff;color:inherit;min-height:180px;position:relative;transition:background .3s,color .3s" onmouseover="this.style.background='#058c8c';this.style.color='#fff'" onmouseout="this.style.background='#fff';this.style.color='inherit'">
    <div style="font-family:var(--font-mono);font-size:11px;color:#a1665e;letter-spacing:0.08em">01 · ADVISORY</div>
    <h3 style="font-family:var(--font-primary);font-size:22px;margin:12px 0 8px 0;letter-spacing:-0.02em;line-height:1">Talk to a Human about AI</h3>
    <p style="font-size:13px;line-height:1.5;max-width:none;margin:0">Not a chatbot or a vendor pitch. A 30-minute conversation with an AI practitioner.</p>
    <div style="position:absolute;bottom:20px;right:24px;width:32px;height:1px;background:#a1665e">
      <span style="position:absolute;right:0;top:-4px;width:8px;height:8px;border-top:1px solid #a1665e;border-right:1px solid #a1665e;transform:rotate(45deg)"></span>
    </div>
  </a>
</div>
</body></html>

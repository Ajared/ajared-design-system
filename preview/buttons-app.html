<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../button.css"></head><body>
<div class="card">
  <div class="row" style="gap:8px">
    <button class="ajr-button ajr-button--primary ajr-button--md">Primary</button>
    <button class="ajr-button ajr-button--secondary ajr-button--md">Secondary</button>
    <button class="ajr-button ajr-button--tertiary ajr-button--md">Tertiary</button>

  </div>

    <button class="ajr-button ajr-button--primary ajr-button--sm">SM</button>
    <button class="ajr-button ajr-button--primary ajr-button--md">MD</button>
    <button class="ajr-button ajr-button--primary ajr-button--lg">LG</button>
    <button class="ajr-button ajr-button--primary ajr-button--md" disabled>Disabled</button>
  </div>
  <span class="meta">APP BUTTONS · from @ajared/design-system · .ajr-button</span>

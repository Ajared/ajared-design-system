<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .legend { display: grid; grid-template-columns: 1fr auto; gap: 16px 8px; align-items: center; margin-top: 4px; }
  .bar { height: 8px; border-radius: 2px; min-width: 60px; }
  .title { font-family: 'iA Writer Mono S', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: #058c8c; margin-bottom: 10px; }
  .sub { font-family: 'iA Writer Mono S', monospace; font-size: 10px; color: #626262; }
  .heat { display: grid; grid-template-columns: repeat(9, 1fr); gap: 3px; }
  .heat div { height: 20px; border-radius: 2px; }
</style>
</head><body>
<div class="card">
  <div class="title">Categorical — series</div>
  <div class="row" style="gap:8px">
    <div class="chip"><div class="swatch-xs swatch" style="background:#058c8c"></div><span class="hex">#058C8C</span></div>
    <div class="chip"><div class="swatch-xs swatch" style="background:#a1665e"></div><span class="hex">#A1665E</span></div>
    <div class="chip"><div class="swatch-xs swatch" style="background:#d09958"></div><span class="hex">#D09958</span></div>
    <div class="chip"><div class="swatch-xs swatch" style="background:#9747ff"></div><span class="hex">#9747FF</span></div>
    <div class="chip"><div class="swatch-xs swatch" style="background:#138c05"></div><span class="hex">#138C05</span></div>
    <div class="chip"><div class="swatch-xs swatch" style="background:#023b3b"></div><span class="hex">#023B3B</span></div>
  </div>

  <div class="title" style="margin-top:16px">Sentiment — positive / neutral / negative</div>
  <div class="legend">
    <div class="bar" style="background:#61b258"></div><span class="sub">Positive · #61B258</span>
    <div class="bar" style="background:#939393"></div><span class="sub">Neutral · #939393</span>
    <div class="bar" style="background:#ec9a29"></div><span class="sub">Negative · #EC9A29</span>
  </div>

  <div class="title" style="margin-top:16px">Sequential heatmap — teal ramp (used in hour×day)</div>
  <div class="heat">
    <div style="background:#e6f4f4"></div>
    <div style="background:#cdebeb"></div>
    <div style="background:#b2dbdb"></div>
    <div style="background:#86dbdb"></div>
    <div style="background:#5dc2c2"></div>
    <div style="background:#2ca5a5"></div>
    <div style="background:#058c8c"></div>
    <div style="background:#046363"></div>
    <div style="background:#023b3b"></div>
  </div>

  <div class="title" style="margin-top:16px">Diverging — terra / teal (rare, used for over/under axes)</div>
  <div class="heat">
    <div style="background:#a1665e"></div>
    <div style="background:#b98b84"></div>
    <div style="background:#d4b9b5"></div>
    <div style="background:#e8dbd9"></div>
    <div style="background:#f7f8f7"></div>
    <div style="background:#d9eaea"></div>
    <div style="background:#b2dbdb"></div>
    <div style="background:#5dc2c2"></div>
    <div style="background:#058c8c"></div>
  </div>
</div>
</body></html>

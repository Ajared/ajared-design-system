<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../input.css"></head><body>
<div class="card">
  <div class="ajr-input-group" style="margin:0">
    <label class="ajr-input-label">Email address</label>
    <input type="email" class="ajr-input" placeholder="your@email.com">
    <span class="ajr-input-helper">We'll never share your email.</span>
  </div>
  <div class="ajr-input-group" style="margin:0">
    <label class="ajr-input-label">Username</label>
    <input type="text" class="ajr-input ajr-input--error" value="ab">
    <span class="ajr-input-helper ajr-input-helper--error">At least 3 characters.</span>
  </div>
</div>
</body></html>

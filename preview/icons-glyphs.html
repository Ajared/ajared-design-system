<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="padding:16px 20px;gap:8px">
  <div class="row" style="gap:16px">
    <!-- arrow primitive -->
    <div style="display:flex;align-items:center;gap:6px">
      <div style="position:relative;width:40px;height:1px;background:#a1665e"><span style="position:absolute;right:0;top:-5px;width:10px;height:10px;border-top:1px solid #a1665e;border-right:1px solid #a1665e;transform:rotate(45deg)"></span></div>
      <span class="hex">arrow</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <span style="width:10px;height:10px;background:#a1665e;border-radius:50%;display:inline-block"></span>
      <span class="hex">status dot</span>
    </div>
    <div style="display:flex;align-items:center;gap:6px"><span style="font-size:18px;color:#058c8c">+</span><span class="hex">open</span></div>
    <div style="display:flex;align-items:center;gap:6px"><span style="font-size:18px;color:#058c8c;transform:rotate(45deg);display:inline-block">+</span><span class="hex">close</span></div>
    <div style="display:flex;align-items:center;gap:6px"><span style="color:#a1665e">›</span><span class="hex">chevron</span></div>
    <div style="display:flex;align-items:center;gap:6px"><span style="color:#a1665e">↗</span><span class="hex">external</span></div>
    <div style="display:flex;align-items:center;gap:6px"><span style="color:#058c8c">✓</span><span class="hex">check</span></div>
  </div>
  <span class="meta">GLYPH PRIMITIVES · used on marketing surfaces</span>
</div>
</body></html>

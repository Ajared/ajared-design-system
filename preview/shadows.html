<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card" style="background:#fafafa">
  <div class="row" style="gap:24px">
    <div class="chip"><div style="width:80px;height:60px;background:#fff;box-shadow:0 1px 2px 0 rgb(0 0 0 / 0.05)"></div><span class="hex">sm</span></div>
    <div class="chip"><div style="width:80px;height:60px;background:#fff;box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1)"></div><span class="hex">base</span></div>
    <div class="chip"><div style="width:80px;height:60px;background:#fff;box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1)"></div><span class="hex">md</span></div>
    <div class="chip"><div style="width:80px;height:60px;background:#fff;box-shadow:0 10px 15px -3px rgb(0 0 0 / 0.1)"></div><span class="hex">lg</span></div>
    <div class="chip"><div style="width:80px;height:60px;background:#fff;box-shadow:0 10px 50px 0 rgb(0 0 0 / 0.15)"></div><span class="hex">swatch ★</span></div>
  </div>
  <span class="meta">ELEVATION · most surfaces are flat; shadow is editorial</span>
</div>
</body></html>

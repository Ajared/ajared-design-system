<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row">
    <div class="chip"><div class="swatch" style="background:#61b258"></div><span class="meta">Success</span><span class="hex">#61B258</span></div>
    <div class="chip"><div class="swatch" style="background:#d6b739"></div><span class="meta">Warning</span><span class="hex">#D6B739</span></div>
    <div class="chip"><div class="swatch" style="background:#8c1305"></div><span class="meta">Error</span><span class="hex">#8C1305</span></div>
    <div class="chip"><div class="swatch" style="background:#71c5e6"></div><span class="meta">Info</span><span class="hex">#71C5E6</span></div>
  </div>
  <div class="row" style="margin-top:4px">
    <div class="chip"><div class="swatch-sm swatch" style="background:#e7f3f4"></div><span class="hex">#E7F3F4 success-lt</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#f7ebc6"></div><span class="hex">#F7EBC6 warn-lt</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#ffa18a"></div><span class="hex">#FFA18A error-lt</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#eaf6fb"></div><span class="hex">#EAF6FB info-lt</span></div>
  </div>
</div>
</body></html>

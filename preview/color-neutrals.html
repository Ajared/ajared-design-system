<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:8px">
    <div class="chip"><div class="swatch-sm swatch" style="background:#000"></div><span class="hex">#000</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#141414"></div><span class="hex">900</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#323232"></div><span class="hex">800</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#434343"></div><span class="hex">700</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#626262"></div><span class="hex">600</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#717171"></div><span class="hex">500</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#939393"></div><span class="hex">400</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#b6b6b6"></div><span class="hex">300</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#d9d9d9"></div><span class="hex">200</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#eeeeee"></div><span class="hex">100</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#f5f5f5;border:1px solid #e2e2e2"></div><span class="hex">50</span></div>
    <div class="chip"><div class="swatch-sm swatch" style="background:#fff;border:1px solid #e2e2e2"></div><span class="hex">WHT</span></div>
  </div>
</div>
</body></html>

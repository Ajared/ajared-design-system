<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><link rel="stylesheet" href="../badge.css"></head><body>
<div class="card">
  <div class="row" style="gap:6px">
    <span class="ajr-badge ajr-badge--primary ajr-badge--md">Primary</span>
    <span class="ajr-badge ajr-badge--secondary ajr-badge--md">Secondary</span>
    <span class="ajr-badge ajr-badge--success ajr-badge--md">Success</span>
    <span class="ajr-badge ajr-badge--warning ajr-badge--md">Warning</span>
    <span class="ajr-badge ajr-badge--error ajr-badge--md">Error</span>
    <span class="ajr-badge ajr-badge--info ajr-badge--md">Info</span>
  </div>
  <div class="row" style="gap:6px">
    <span class="ajr-badge ajr-badge--primary ajr-badge--outlined ajr-badge--md">Outlined</span>
    <span class="ajr-badge ajr-badge--error ajr-badge--outlined ajr-badge--md">Outlined</span>
  </div>
</div>
</body></html>

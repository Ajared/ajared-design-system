<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head><body>
<div class="card">
  <div class="row" style="gap:20px;align-items:flex-end">
    <div class="chip"><div style="width:56px;height:40px;background:#058c8c;border-radius:0"></div><span class="hex">none 0</span></div>
    <div class="chip"><div style="width:56px;height:40px;background:#058c8c;border-radius:2px"></div><span class="hex">sm 2</span></div>
    <div class="chip"><div style="width:56px;height:40px;background:#058c8c;border-radius:4px"></div><span class="hex">base 4</span></div>
    <div class="chip"><div style="width:56px;height:40px;background:#058c8c;border-radius:8px"></div><span class="hex">lg 8</span></div>
    <div class="chip"><div style="width:56px;height:40px;background:#058c8c;border-radius:12px"></div><span class="hex">xl 12</span></div>
    <div class="chip"><div style="width:56px;height:40px;background:#058c8c;border-radius:16px"></div><span class="hex">2xl 16</span></div>
    <div class="chip"><div style="width:56px;height:40px;background:#058c8c;border-radius:9999px"></div><span class="hex">full pill</span></div>
  </div>
  <span class="meta">DEFAULT · 2px (marketing) · Mobile CTA pills use full</span>
</div>
</body></html>
